<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Techedelic — Interactive Logo</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="ui">
    <button id="startBtn" class="btn">Start</button>
    <button id="demoBtn" class="btn">Demo</button>
    <button id="micBtn" class="btn">Mic</button>
    <label class="file-label btn">
      Upload
      <input id="fileInput" type="file" accept="audio/*" style="display:none">
    </label>
    <div id="audioStatus" class="status">Idle</div>
    <button id="gearBtn" class="gear" title="Settings">⚙</button>
  </div>
  <canvas id="glcanvas"></canvas>
  <!-- Error overlay + global handlers (added to surface runtime errors on deploy) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>
  <div id="errorOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);color:#fff;padding:20px;z-index:9999;overflow:auto;font-family:monospace; font-size:13px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <strong>Runtime Error</strong>
      <button id="closeErr" style="background:#222;color:#fff;border:1px solid #444;padding:6px;border-radius:4px;">Close</button>
    </div>
    <pre id="errorText" style="white-space:pre-wrap;word-break:break-word"></pre>
  </div>
  <script>
    (function(){
      const overlay = document.getElementById('errorOverlay');
      const errText = document.getElementById('errorText');
      const closeBtn = document.getElementById('closeErr');
      closeBtn.addEventListener('click', ()=> overlay.style.display='none');
      function show(msg){ errText.textContent = msg; overlay.style.display='block'; }
      window.addEventListener('error', (e)=>{
        try{ show((e && e.message ? e.message : 'Error') + '\n' + (e && e.filename ? e.filename+':'+e.lineno+':'+e.colno+'\n' : '') + (e && e.error && e.error.stack ? e.error.stack : '')); }catch(err){}
      });
      window.addEventListener('unhandledrejection', (ev)=>{
        try{ const r = ev && ev.reason ? ev.reason : ev; show('Unhandled Promise Rejection:\n' + (r && r.stack ? r.stack : (typeof r === 'string' ? r : JSON.stringify(r)))); }catch(err){}
      });
      window.addEventListener('DOMContentLoaded', ()=>{
        const status = document.createElement('div');
        status.id = 'appStatus'; status.textContent='Idle';
        status.style.position='fixed'; status.style.left='12px'; status.style.top='48px'; status.style.zIndex=30; status.style.color='#fff'; status.style.background='transparent';
        document.body.appendChild(status);
        window.appStatus = status;
      });
    })();
  </script>
  <!-- Small controls panel for tuning (specialist) -->
  <style>
    #controlsPanel{position:fixed;right:12px;top:12px;background:rgba(0,0,0,0.6);color:#fff;padding:10px;border-radius:6px;font-size:13px;z-index:60;width:260px}
    #controlsPanel label{display:block;margin-top:8px}
    #controlsPanel input[type=range]{width:100%}
    #controlsPanel .row{display:flex;justify-content:space-between;align-items:center}
  </style>
  <div id="controlsPanel">
    <strong>Controls (dev)</strong>
    <label>Glow Gain <input id="ctrlGlowGain" type="range" min="0" max="3" step="0.05" value="1.6"></label>
    <label>Glow Smooth <input id="ctrlGlowSmooth" type="range" min="0" max="1" step="0.01" value="0.2"></label>
    <label>Sensitivity <input id="ctrlSensitivity" type="range" min="0.1" max="3" step="0.05" value="1.0"></label>
    <label>Smooth Alpha <input id="ctrlSmoothAlpha" type="range" min="0" max="1" step="0.01" value="0.15"></label>
    <label>Beat Threshold <input id="ctrlBeatThresh" type="range" min="0.5" max="3" step="0.05" value="1.4"></label>
    <label class="row">Monitor <input id="ctrlMonitor" type="checkbox"></label>
    <div style="margin-top:8px;font-size:12px;opacity:0.9">Note: Monitor can cause feedback. Disabled by default for mic.</div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
